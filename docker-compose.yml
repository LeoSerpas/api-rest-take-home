services:

  # Base de datos MySQL
  mysql:
    image: mysql:8.0
    container_name: trx-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: trx_api_db
      MYSQL_USER: trx_user
      MYSQL_PASSWORD: trx_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Aplicacion Spring Boot
  app:
    build: .
    container_name: trx-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:mysql://mysql:3306/trx_api_db
      DB_USERNAME: trx_user
      DB_PASSWORD: trx_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data: